spring:
  datasource:
    # As variáveis abaixo são preenchidas pelo DynamicPropertySource da BaseIntegrationTest
    url: ${spring.datasource.url}
    username: ${spring.datasource.username}
    password: ${spring.datasource.password}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      # Mantém a configuração de performance que você já usa
      connection-init-sql: SET SESSION group_concat_max_len = 2097152

  jpa:
    open-in-view: false
    hibernate:
      # No teste usamos create-drop para garantir que o container comece limpo
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        type:
          preferred_boolean_type: tinyint
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

  kafka:
    bootstrap-servers: ${spring.kafka.bootstrap-servers}

# Propriedade para o seu AuthorizationClientService
auth:
  service:
    url: ${auth.service.url}
